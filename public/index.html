<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KomikCast API Playground</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Inter:wght@400;500;600;700;800&display=swap');
  :root { --bg-base:#0B0E14; --bg-surface:rgba(22,26,35,0.7); --border-color:rgba(255,255,255,0.08); --text-primary:#F8FAFC; --text-secondary:#94A3B8; --accent-primary:#6366f1; --accent-success:#10B981; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background-color: var(--bg-base); color: var(--text-primary); font-family: 'Inter', sans-serif; height: 100vh; display: flex; flex-direction: column; }
  .topbar { background: rgba(11,14,20,0.8); border-bottom: 1px solid var(--border-color); padding: 16px 24px; display: flex; align-items: center; gap: 16px; }
  .layout { display: grid; grid-template-columns: 280px 1fr; flex: 1; min-height: 0; overflow: hidden; }
  .sidebar { background: rgba(15,18,25,0.4); border-right: 1px solid var(--border-color); padding: 24px 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 24px; }
  .ep-group { display: flex; flex-direction: column; gap: 4px; }
  .ep-label { font-size: 11px; font-weight: 700; color: #64748B; padding: 0 8px 8px; text-transform: uppercase; }
  .ep-btn { width: 100%; text-align: left; background: transparent; border: 1px solid transparent; border-radius: 8px; padding: 10px 12px; cursor: pointer; display: flex; align-items: center; gap: 10px; color: var(--text-secondary); }
  .ep-btn:hover { background: var(--bg-surface); color: var(--text-primary); }
  .ep-btn.active { background: rgba(30,35,48,0.8); border-color: var(--border-color); color: var(--text-primary); }
  .mtag { font-size: 10px; font-weight: 800; padding: 3px 6px; border-radius: 4px; background: rgba(99,102,241,0.15); color: var(--accent-primary); }
  .ep-path { font-size: 12px; font-family: 'Fira Code', monospace; }
  .main { display: flex; flex-direction: column; background: var(--bg-base); min-height: 0; overflow: hidden; }
  .req-panel { padding: 24px; border-bottom: 1px solid var(--border-color); }
  .url-row { display: flex; gap: 12px; align-items: center; background: var(--bg-surface); padding: 6px; border-radius: 12px; border: 1px solid var(--border-color); }
  .method-badge { background: var(--accent-primary); color: white; border-radius: 6px; padding: 8px 14px; font-size: 12px; font-weight: 800; }
  .url-input { flex: 1; background: transparent; border: none; color: var(--text-primary); font-family: 'Fira Code', monospace; outline: none; }
  .send-btn { background: var(--text-primary); color: var(--bg-base); border: none; border-radius: 6px; padding: 8px 24px; font-weight: 700; cursor: pointer; }
  .params-row { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 20px; }
  .param-chip { display: flex; align-items: center; background: var(--bg-surface); border: 1px solid var(--border-color); border-radius: 8px; padding: 6px 12px; }
  .param-chip label { font-size: 11px; font-weight: 600; color: #64748B; margin-right: 8px; text-transform: uppercase; }
  .param-chip input { background: transparent; border: none; color: var(--text-primary); font-family: 'Fira Code', monospace; width: 120px; outline: none; }
  .res-panel { flex: 1; display: flex; flex-direction: column; margin: 24px; background: var(--bg-surface); border: 1px solid var(--border-color); border-radius: 12px; overflow: hidden; }
  .json-wrap { flex: 1; overflow: auto; padding: 20px; background: rgba(0,0,0,0.3); }
  .json-box { font-family: 'Fira Code', monospace; font-size: 13px; white-space: pre-wrap; color: var(--text-secondary); word-break: break-word; }
  .jk { color: #7DD3FC; } .js { color: #A7F3D0; } .jn { color: #FDBA74; } .jb { color: #C084FC; }
</style>
</head>
<body>
<div class="topbar">
  <div class="logo"><span>KomikCast API Adapter</span></div>
</div>
<div class="layout">
  <div class="sidebar">
    <div class="ep-group">
      <div class="ep-label">MangNime Endpoints</div>
      <button class="ep-btn active" onclick="sel(this,'/api/home',[])"><span class="mtag">GET</span><span class="ep-path">/api/home</span></button>
      <button class="ep-btn" onclick="sel(this,'/api/latest',['page'])"><span class="mtag">GET</span><span class="ep-path">/api/latest</span></button>
      <button class="ep-btn" onclick="sel(this,'/api/popular',['category','page'])"><span class="mtag">GET</span><span class="ep-path">/api/popular</span></button>
      <button class="ep-btn" onclick="sel(this,'/api/advanceSearch',['search','genreIds','page'])"><span class="mtag">GET</span><span class="ep-path">/api/advanceSearch</span></button>
      <button class="ep-btn" onclick="sel(this,'/api/genres',[])"><span class="mtag">GET</span><span class="ep-path">/api/genres</span></button>
    </div>
    <div class="ep-group">
      <div class="ep-label">Details</div>
      <button class="ep-btn" onclick="sel(this,'/api/komik/:slug',['slug'])"><span class="mtag">GET</span><span class="ep-path">/api/komik/:slug</span></button>
      <button class="ep-btn" onclick="sel(this,'/api/komik/:slug/:chapterId',['slug','chapterId'])"><span class="mtag">GET</span><span class="ep-path">/api/komik/:slug/:chapterId</span></button>
    </div>
  </div>
  <div class="main">
    <div class="req-panel">
      <div class="url-row">
        <div class="method-badge">GET</div>
        <input class="url-input" id="urlInput"/>
        <button class="send-btn" id="sendBtn" onclick="send()">Send</button>
      </div>
      <div class="params-row" id="paramsRow"></div>
    </div>
    <div class="res-panel">
      <div class="json-wrap" id="jsonWrap">Click Send Request to execute</div>
    </div>
  </div>
</div>

<script>
const BASE = window.location.origin;
let curPath = '/api/home', curParams = [];

window.onload = () => { sel(document.querySelector('.ep-btn'), curPath, curParams); };

function sel(btn, path, params) {
  document.querySelectorAll('.ep-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  curPath = path; curParams = params;
  buildInputs(params); buildUrl();
}

function buildInputs(params) {
  const row = document.getElementById('paramsRow');
  if(!params.length) { row.innerHTML = ''; return; }
  row.innerHTML = params.map(p => {
    let defVal = p === 'page' ? '1' : 
                 p === 'search' ? 'demon' : 
                 p === 'genreIds' ? '' : // Biarkan kosong secara default
                 p === 'slug' ? 'legend-of-the-northern-blade' : 
                 p === 'chapterId' ? '17' : '';
    return `<div class="param-chip"><label>${p}</label><input id="param-${p}" value="${defVal}" oninput="buildUrl()"/></div>`;
  }).join('');
}

function buildUrl() {
  let path = curPath; const qs = [];
  curParams.forEach(p => {
    const v = document.getElementById('param-'+p)?.value || '';
    if (path.includes(':' + p)) path = path.replace(':' + p, encodeURIComponent(v));
    else if (v) qs.push(p + '=' + encodeURIComponent(v));
  });
  document.getElementById('urlInput').value = BASE + path + (qs.length ? '?' + qs.join('&') : '');
}

async function send() {
  const wrap = document.getElementById('jsonWrap');
  wrap.innerHTML = `<div style="color:var(--text-secondary)">Loading...</div>`;
  try {
    const res = await fetch(document.getElementById('urlInput').value);
    const json = await res.json();
    wrap.innerHTML = `<div class="json-box">${highlight(JSON.stringify(json, null, 2))}</div>`;
  } catch(e) {
    wrap.innerHTML = `<div style="color:#EF4444">Error: ${e.message}</div>`;
  }
}

function highlight(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, m => {
      let c = 'jn'; if (/^"/.test(m)) c = /:$/.test(m) ? 'jk' : 'js'; else if (/true|false/.test(m)) c = 'jb'; else if (/null/.test(m)) c = 'jnull';
      return `<span class="${c}">${m}</span>`;
    });
}
</script>
</body>
</html>
